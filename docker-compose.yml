services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RENDER_URL: http://localhost:4000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    container_name: swiftdrop_all_in_one
    ports:
      - "3001:3000"
      - "4000:4000"
      - "42717:27017" # Permet toujours l'accès externe à la DB si besoin
    environment:
      - DATABASE_URL=mongodb://localhost:27017/swiftdrop
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_TRUST_HOST=true
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=yoursecretisreadyforv2
      - NEXT_PUBLIC_RENDER_URL=http://localhost:4000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
    restart: always
    volumes:
      - swiftdrop_data:/data/db

volumes:
  swiftdrop_data:
